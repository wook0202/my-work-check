<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Style T&A</title>
    <style>
        /* --- Notion Style Variables --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --secondary-text: #9b9a97;
            --border-color: #e0e0e0;
            --hover-bg: #f7f7f5;
            --black-btn: #2e2e2e;
            --input-bg: #f7f7f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; justify-content: center;
            min-height: 100vh; padding: 20px;
        }

        .app-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 24px; }

        /* Header */
        header { padding-bottom: 12px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-start; }
        .header-left h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .live-clock { color: var(--secondary-text); font-size: 14px; font-variant-numeric: tabular-nums; }
        
        /* Reset Button (Small) */
        .btn-reset {
            font-size: 11px; color: var(--secondary-text); background: none; border: 1px solid var(--border-color);
            padding: 4px 8px; border-radius: 4px; cursor: pointer;
        }
        .btn-reset:hover { background: #ffeaea; color: #d93025; border-color: #d93025; }

        /* User Input Section */
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; font-weight: 600; color: var(--secondary-text); text-transform: uppercase; }
        input[type="text"] {
            width: 100%; padding: 10px 12px;
            font-size: 16px; border: 1px solid var(--border-color);
            border-radius: 4px; background: var(--input-bg);
            color: var(--text-color); outline: none; transition: 0.2s;
        }
        input[type="text"]:focus { background: white; border-color: #a0a0a0; box-shadow: 0 0 0 2px rgba(46,46,46, 0.1); }

        /* Status Card */
        .card {
            padding: 20px; border: 1px solid var(--border-color);
            border-radius: 6px; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .timer { font-size: 42px; font-weight: 600; letter-spacing: -1px; margin: 10px 0; }
        .status-badge {
            font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: 500;
            background: #e3e2e0; color: var(--text-color);
        }
        .status-badge.working { background: #d3f9d8; color: #1c3829; }

        /* Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button {
            padding: 14px; border-radius: 4px; font-size: 15px; font-weight: 500;
            cursor: pointer; border: 1px solid var(--border-color);
            background: white; color: var(--text-color); transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--black-btn); color: white; border-color: var(--black-btn); }
        .btn-primary:hover { background-color: #474747; }
        .btn-primary:disabled { background-color: #a0a0a0; border-color: #a0a0a0; cursor: not-allowed; }
        .btn-secondary:disabled { color: #ccc; cursor: not-allowed; }

        /* Loading Spinner */
        .spinner {
            display: none; width: 20px; height: 20px; border: 2px solid #f3f3f3;
            border-top: 2px solid #333; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-left">
                <h1>🏢 Workspace</h1>
                <div class="live-clock" id="liveClock">Loading...</div>
            </div>
            <button class="btn-reset" onclick="resetApp()">↻ 초기화</button>
        </header>

        <div class="input-group">
            <label for="username">User Name</label>
            <input type="text" id="username" placeholder="이름을 입력하세요 (예: 홍길동)">
        </div>

        <div class="card">
            <div id="statusBadge" class="status-badge">출근 전</div>
            <div class="timer" id="workTimer">00:00:00</div>
            <div class="spinner" id="loadingSpinner"></div>
        </div>

        <div class="btn-group">
            <button id="btnCheckIn" class="btn-primary" onclick="submitRecord('출근')">출근하기</button>
            <button id="btnCheckOut" class="btn-secondary" onclick="submitRecord('퇴근')" disabled>퇴근하기</button>
        </div>
    </div>

    <script>
        // ==========================================
        // [설정] 1단계에서 복사한 구글 앱스 스크립트 URL을 따옴표 안에 넣으세요
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfEZYW7gZFyBJG6vA4Ee__uJQ6P060_6MNIJ3MdkMw6MznD0BDTu1KsWMks3hQeu9t/exec"; 
        // ==========================================

        let isWorking = false;
        let startTime = null;
        let timerInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            loadState();
        });

        // 1. 실시간 시계
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'short', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            };
            document.getElementById('liveClock').innerText = now.toLocaleString('ko-KR', options);
        }

        // 2. 구글 시트 전송
        function submitRecord(type) {
            const name = document.getElementById('username').value.trim();
            
            if (!name) {
                alert("이름을 입력해주세요.");
                document.getElementById('username').focus();
                return;
            }
            if (!GOOGLE_SCRIPT_URL) {
                alert("HTML 파일 내부의 GOOGLE_SCRIPT_URL 변수에 주소를 넣어주세요.");
                return;
            }

            if (!confirm(`'${name}'님, ${type} 처리하시겠습니까?`)) return;

            setLoading(true);

            const formData = new FormData();
            formData.append('name', name);
            formData.append('type', type);

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => {
                setLoading(false);
                if (data.result === 'success') {
                    alert(`${type} 완료!`);
                    processStateChange(type);
                } else {
                    alert("오류 발생");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                setLoading(false);
                alert("전송 완료 (네트워크 확인 필요)");
                processStateChange(type);
            });
        }

        // 3. 상태 변경 로직
        function processStateChange(type) {
            if (type === '출근') {
                isWorking = true;
                startTime = new Date();
                saveState();
                updateUI(true);
                startTimerDisplay();
            } else {
                isWorking = false;
                startTime = null;
                saveState();
                updateUI(false);
                stopTimerDisplay();
            }
        }

        // UI 업데이트 (수정됨: 이름 입력칸을 비활성화하지 않음)
        function updateUI(working) {
            const btnIn = document.getElementById('btnCheckIn');
            const btnOut = document.getElementById('btnCheckOut');
            const badge = document.getElementById('statusBadge');
            
            // 주의: 이름 입력칸(nameInput)을 비활성화하는 코드를 제거했습니다.
            // 이제 출근 중이어도 이름을 수정할 수 있습니다.

            if (working) {
                btnIn.disabled = true;
                btnIn.classList.replace('btn-primary', 'btn-secondary');
                btnOut.disabled = false;
                btnOut.classList.replace('btn-secondary', 'btn-primary');
                
                badge.innerText = "업무 중";
                badge.classList.add('working');
            } else {
                btnIn.disabled = false;
                btnIn.classList.replace('btn-secondary', 'btn-primary');
                btnOut.disabled = true;
                btnOut.classList.replace('btn-primary', 'btn-secondary');

                badge.innerText = "출근 전";
                badge.classList.remove('working');
            }
        }

        // 강제 초기화 기능 (우측 상단 버튼)
        function resetApp() {
            if(confirm("모든 데이터를 초기화하시겠습니까?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function setLoading(isLoading) {
            const spinner = document.getElementById('loadingSpinner');
            const timer = document.getElementById('workTimer');
            if(isLoading) {
                spinner.style.display = 'block';
                timer.style.opacity = '0.3';
            } else {
                spinner.style.display = 'none';
                timer.style.opacity = '1';
            }
        }

        function startTimerDisplay() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!startTime) return;
                const now = new Date();
                const diff = now - new Date(startTime);
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('workTimer').innerText = 
                    `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimerDisplay() {
            clearInterval(timerInterval);
            document.getElementById('workTimer').innerText = "00:00:00";
        }

        function saveState() {
            localStorage.setItem('tna_isWorking', isWorking);
            localStorage.setItem('tna_startTime', startTime);
            localStorage.setItem('tna_username', document.getElementById('username').value);
        }

        function loadState() {
            const savedIsWorking = localStorage.getItem('tna_isWorking') === 'true';
            const savedStartTime = localStorage.getItem('tna_startTime');
            const savedName = localStorage.getItem('tna_username');

            if (savedName) document.getElementById('username').value = savedName;

            if (savedIsWorking && savedStartTime) {
                isWorking = true;
                startTime = new Date(savedStartTime);
                updateUI(true);
                startTimerDisplay();
            }
        }
    </script>
</body>
</html>
